version: "3.9"

services:
  pipeline:
    build: .
    container_name: cyber_risk_pipeline
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    command: python scripts/run_pipeline.py --log-dir data/sample_logs/
    environment:
      - PYTHONUNBUFFERED=1

  dashboard:
    build: .
    container_name: cyber_risk_dashboard
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    command: uvicorn src.dashboard.api:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - pipeline
    environment:
      - PYTHONUNBUFFERED=1
